<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meals</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="mb-4">My Meals</h1>

    <div class="row">

        {% for meal in meals %}

        <div class="col-md-6 col-lg-4 mb-4">

            <div class="card h-100 shadow-sm">

                {% if meal.image %}
                    <img src="{{ meal.image.url }}"
                         class="card-img-top"
                         style="height:220px; object-fit:cover;"
                         alt="{{ meal.name }}">
                {% endif %}

                <div class="card-body d-flex flex-column">

                    <h5 class="card-title">
                        {{ meal.name }}
                    </h5>

                    {% if meal.description %}
                        <p class="card-text text-muted">
                            {{ meal.description|truncatewords:20 }}
                        </p>
                    {% endif %}

                    <p class="mb-2">
                        <span class="badge bg-primary">
                            Serves {{ meal.base_servings }}
                        </span>

                        {% if meal.favourite %}
                            <span class="badge bg-warning text-dark">
                                ★ Favourite
                            </span>
                        {% endif %}
                    </p>

                    <a href="{% url 'shopping:meal-detail' meal.pk %}"
                       class="btn btn-success mt-auto">
                        View Recipe
                    </a>

                </div>

            </div>

        </div>

        {% empty %}

        <p>No meals found.</p>

        {% endfor %}

    </div>

</div>

</body>
</html>
